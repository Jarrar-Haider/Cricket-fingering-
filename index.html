<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Fingering by Jarrar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Syncopate:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #000; height: 100vh; overflow: hidden; margin: 0; }
        
        .gradient-title {
            background: linear-gradient(135deg, #ff7e00, #ff4500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Bungee', cursive;
        }

        .cartoon-pitch {
            background: #4caf50;
            background-image: radial-gradient(#55bd59 20%, transparent 20%), radial-gradient(#55bd59 20%, transparent 20%);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
            position: fixed; inset: 0; z-index: 0;
        }

        .pitch-center {
            position: absolute; width: 35%; height: 100%; top: 0; left: 32.5%;
            background: #e3c191; border-left: 5px solid rgba(255,255,255,0.1); border-right: 5px solid rgba(255,255,255,0.1);
            z-index: 1;
        }

        .front-ui { position: relative; z-index: 50; height: 100vh; display: flex; flex-direction: column; pointer-events: none; }
        .interactive { pointer-events: auto; }

        /* Animated Round Circles */
        .round-circle {
            width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            position: relative; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .round-circle.user-win {
            background: #ff7e00; border-color: #ff7e00;
            box-shadow: 0 0 12px #ff7e00; transform: scale(1.2);
        }
        .round-circle.cpu-win {
            background: #ff4d4d; border-color: #ff4d4d;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }
        
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .selection-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease; cursor: pointer;
        }
        .selection-card.active {
            background: rgba(255, 126, 0, 0.2); border-color: #ff7e00;
            box-shadow: 0 0 15px rgba(255, 126, 0, 0.3);
        }

        .hand-btn { transition: all 0.2s; background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(255,126,0,0.3); border-radius: 12px; }
        .ball { position: absolute; width: 20px; height: 20px; background: #ff4d4d; border-radius: 50%; opacity: 0; z-index: 40; }
    </style>
</head>
<body class="cartoon-pitch">
    <div class="pitch-center"></div>

    <audio id="bg-music" loop preload="auto" src="https://codeskulptor-demos.commondatastorage.googleapis.com/GalaxyInvaders/theme.mp3"></audio>
    <audio id="out-sfx" preload="auto" src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/Crumble%20Sound.mp3"></audio>

    <div id="loading-screen">
        <div class="text-center px-6">
            <h1 class="gradient-title text-5xl italic uppercase">CRICKET<br>FINGERING</h1>
            <p class="text-white opacity-60 text-[10px] tracking-[0.4em] font-bold mt-3 uppercase">By Jarrar</p>
            <p class="text-orange-500 text-[9px] tracking-[0.2em] font-black mt-1 uppercase">ft. Asad</p>
        </div>
        <div class="mt-12 w-48 h-1 bg-gray-900 rounded-full overflow-hidden">
            <div id="load-bar" class="h-full bg-orange-600 w-0"></div>
        </div>
        <button id="start-btn" class="hidden mt-10 px-14 py-4 bg-orange-600 text-white font-black rounded-full shadow-2xl animate-pulse interactive">START GAME</button>
    </div>

    <div id="rounds-modal" class="hidden fixed inset-0 bg-black/98 z-[650] flex items-center justify-center p-6 backdrop-blur-2xl">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-orange-500 font-black italic text-2xl uppercase mb-8">SELECT SERIES</h2>
            <div class="space-y-4">
                <div onclick="setRounds(1, this)" class="selection-card p-5 rounded-2xl flex justify-between items-center interactive active">
                    <h3 class="font-black text-white uppercase text-xs">One Tap Match</h3>
                    <span class="text-orange-500 font-black text-xs">1 ROUND</span>
                </div>
                <div onclick="setRounds(3, this)" class="selection-card p-5 rounded-2xl flex justify-between items-center interactive">
                    <h3 class="font-black text-white uppercase text-xs">Best of Three</h3>
                    <span class="text-orange-500 font-black text-xs">3 ROUNDS</span>
                </div>
                <div onclick="setRounds(5, this)" class="selection-card p-5 rounded-2xl flex justify-between items-center interactive">
                    <h3 class="font-black text-white uppercase text-xs">Ultimate Series</h3>
                    <span class="text-orange-500 font-black text-xs">5 ROUNDS</span>
                </div>
                <button id="confirm-rounds" class="bg-orange-600 w-full py-5 rounded-2xl font-black text-white uppercase mt-4 interactive">CONTINUE</button>
            </div>
        </div>
    </div>

    <div id="setup-modal" class="hidden fixed inset-0 bg-black/98 z-[600] flex items-center justify-center p-6 backdrop-blur-2xl">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-orange-500 font-black italic text-2xl uppercase mb-8">SELECT DIFFICULTY</h2>
            <div class="space-y-4">
                <div onclick="setDiff('easy', this)" class="selection-card p-4 rounded-2xl flex justify-between items-center interactive">
                    <h3 class="font-black text-white uppercase text-xs">EASY</h3>
                    <span class="text-xl">🍃</span>
                </div>
                <div onclick="setDiff('normal', this)" class="selection-card active p-4 rounded-2xl flex justify-between items-center interactive">
                    <h3 class="font-black text-white uppercase text-xs">NORMAL</h3>
                    <span class="text-xl">⚡</span>
                </div>
                <div onclick="setDiff('hard', this)" class="selection-card p-4 rounded-2xl flex justify-between items-center interactive">
                    <h3 class="font-black text-white uppercase text-xs">HARD</h3>
                    <span class="text-xl">🔥</span>
                </div>
                <button id="final-start" class="bg-orange-600 w-full py-5 rounded-2xl font-black text-white uppercase mt-4 interactive">PLAY SERIES</button>
            </div>
        </div>
    </div>

    <div class="front-ui">
        <div class="p-4 space-y-3 interactive">
            <div class="flex flex-col gap-2 bg-black/60 p-4 rounded-[1.5rem] border border-white/5">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[9px] font-black text-white/40 uppercase tracking-widest">Series Progress</span>
                    <span id="series-score" class="text-[10px] font-black text-white uppercase">YOU 0 - 0 CPU</span>
                </div>
                <div id="series-dots" class="flex gap-3 justify-center">
                    </div>
            </div>
            
            <div id="role-indicator" class="w-full py-2 rounded-full text-center text-[10px] font-black uppercase tracking-[0.3em] bg-white/5 border border-white/10 text-white/40">
                Awaiting Toss...
            </div>

            <div class="flex justify-between items-center">
                <div class="bg-black/80 p-3 rounded-2xl border border-white/10">
                    <p class="text-orange-500 text-[9px] font-black uppercase">MATCH SCORE</p>
                    <h2 id="user-score-ui" class="text-4xl font-black text-white">0</h2>
                </div>
                <button onclick="toggleMusic()" class="bg-black/80 p-4 rounded-full border border-white/10">
                    <span id="music-icon" class="text-xl">🔊</span>
                </button>
            </div>
        </div>

        <div id="ball" class="ball"></div>

        <div class="flex-1 flex flex-col items-center justify-between pb-28">
            <div class="mt-4 text-center">
                <div class="bg-black/80 p-6 rounded-[2.5rem] border border-red-900/50 shadow-2xl">
                    <div id="cpu-hand" class="text-7xl">😈</div>
                </div>
                <div id="target-box" class="hidden mt-4 bg-yellow-500 text-black px-5 py-1 rounded-full font-black text-[10px] uppercase">Target: 0</div>
            </div>

            <div id="status-bar" class="w-full bg-black/90 py-5 border-y border-white/5 text-center interactive">
                <p id="game-info" class="font-black text-lg text-orange-500 italic uppercase">Cricket Fingering</p>
            </div>

            <div class="w-full max-w-sm px-6 mb-2 interactive">
                <div id="toss-area" class="flex gap-4">
                    <button onclick="runToss('Heads')" class="bg-orange-600 flex-1 py-5 rounded-3xl font-black text-white">HEADS</button>
                    <button onclick="runToss('Tails')" class="bg-white flex-1 py-5 rounded-3xl font-black text-black">TAILS</button>
                </div>
                <div id="batting-area" class="hidden grid grid-cols-5 gap-2"></div>
                <div id="rematch-area" class="hidden text-center">
                    <h1 id="winner-text" class="text-4xl font-black text-white mb-8 italic uppercase"></h1>
                    <button id="next-round-btn" class="bg-orange-600 px-16 py-5 rounded-3xl font-black text-white shadow-2xl uppercase">Next Round</button>
                </div>
            </div>
        </div>
    </div>

    <div id="out-modal" class="hidden fixed inset-0 bg-black/95 z-[700] flex items-center justify-center p-6">
        <div class="bg-gray-900 border border-orange-600/30 p-10 rounded-[3rem] text-center w-full max-w-xs shadow-2xl">
            <h1 class="text-7xl font-black text-white mb-2 italic">OUT</h1>
            <p class="text-orange-500 mb-10 font-bold uppercase text-[10px]">Switching Sides</p>
            <button onclick="closeOutModal()" class="w-full bg-orange-600 py-5 rounded-2xl font-black text-lg text-white uppercase">Continue</button>
        </div>
    </div>

    <script>
        const moves = [{val:1,img:"☝️"},{val:2,img:"✌️"},{val:3,img:"🤟"},{val:4,img:"🖖"},{val:5,img:"🖐️"},{val:6,img:"👍"},{val:10,img:"✊"},{val:20,img:"👎"},{val:50,img:"🤙"},{val:100,img:"👆🏻"}];
        let series = { total: 1, current: 0, uWins: 0, cWins: 0 };
        let state = { uScore: 0, cScore: 0, target: Infinity, isBatting: null, isMusic: true, difficulty: 'normal' };
        
        const aud = { bg: document.getElementById('bg-music'), out: document.getElementById('out-sfx') };
        aud.bg.volume = 1.0; aud.out.volume = 1.0;

        window.onload = () => {
            let p = 0;
            let itv = setInterval(() => {
                p += 10; document.getElementById('load-bar').style.width = p + "%";
                if(p >= 100) { clearInterval(itv); document.getElementById('start-btn').classList.remove('hidden'); }
            }, 30);
        };

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('loading-screen').remove();
            document.getElementById('rounds-modal').classList.remove('hidden');
            if(state.isMusic) { 
                aud.bg.play().catch(()=>{}); 
                aud.out.play().then(() => { aud.out.pause(); aud.out.currentTime = 0; }).catch(()=>{});
            }
        };

        function setRounds(r, el) {
            series.total = r;
            document.querySelectorAll('#rounds-modal .selection-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        document.getElementById('confirm-rounds').onclick = () => {
            document.getElementById('rounds-modal').classList.add('hidden');
            document.getElementById('setup-modal').classList.remove('hidden');
            initCircles();
        };

        function initCircles() {
            const container = document.getElementById('series-dots');
            container.innerHTML = '';
            for(let i=0; i < series.total; i++) {
                const div = document.createElement('div');
                div.className = 'round-circle';
                container.appendChild(div);
            }
        }

        function setDiff(d, el) {
            state.difficulty = d;
            document.querySelectorAll('#setup-modal .selection-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        document.getElementById('final-start').onclick = () => {
            document.getElementById('setup-modal').classList.add('hidden');
            if(state.isMusic) aud.bg.play().catch(()=>{});
        };

        function toggleMusic() {
            state.isMusic = !state.isMusic;
            document.getElementById('music-icon').innerText = state.isMusic ? "🔊" : "🔇";
            state.isMusic ? aud.bg.play() : aud.bg.pause();
        }

        function runToss(choice) {
            const won = Math.random() < 0.5;
            document.getElementById('toss-area').innerHTML = won ? 
                `<button onclick='setPhase(true)' class='bg-green-600 flex-1 py-4 rounded-3xl font-black text-white text-xs'>BAT FIRST</button>
                 <button onclick='setPhase(false)' class='bg-blue-600 flex-1 py-4 rounded-3xl font-black text-white text-xs'>BOWL FIRST</button>` :
                `<button onclick='setPhase(${Math.random() < 0.5})' class='bg-orange-600 w-full py-4 rounded-3xl font-black text-white uppercase'>CPU WON TOSS</button>`;
        }

        function setPhase(b) {
            state.isBatting = b;
            document.getElementById('toss-area').classList.add('hidden');
            document.getElementById('batting-area').classList.remove('hidden');
            document.getElementById('batting-area').innerHTML = moves.map(m => `
                <button onclick="playTurn(${m.val})" class="hand-btn py-4 active:scale-90 transition-all">
                    <span class="text-2xl block mb-1">${m.img}</span>
                    <span class="text-[8px] font-black text-orange-500">${m.val}</span>
                </button>
            `).join('');
            updateUI();
        }

        function playTurn(uMove) {
            let roll = Math.random();
            let cMove = (state.difficulty === 'hard' && roll < 0.75) ? uMove : moves[Math.floor(Math.random() * moves.length)].val;
            document.getElementById('cpu-hand').innerText = moves.find(m => m.val === cMove).img;

            if (uMove === cMove) {
                if(state.isMusic) { aud.out.currentTime = 0; aud.out.play(); }
                document.getElementById('out-modal').classList.remove('hidden');
            } else {
                let r = state.isBatting ? uMove : cMove;
                state.isBatting ? state.uScore += r : state.cScore += r;
                ballHit(); updateUI(); checkWin();
            }
        }

        function ballHit() {
            const b = document.getElementById('ball');
            b.style.opacity = "1";
            b.animate([{ bottom: '20%', left: '50%', opacity: 1 }, { transform: 'scale(0)', bottom: '80%', opacity: 0 }], { duration: 400 });
        }

        function closeOutModal() {
            document.getElementById('out-modal').classList.add('hidden');
            if (state.target === Infinity) {
                state.target = state.isBatting ? state.uScore : state.cScore;
                state.isBatting = !state.isBatting;
                document.getElementById('target-box').innerText = `Target: ${state.target + 1}`;
                document.getElementById('target-box').classList.remove('hidden');
                updateUI();
            } else { endRound(); }
        }

        function updateUI() {
            document.getElementById('user-score-ui').innerText = state.isBatting ? state.uScore : state.cScore;
            const ind = document.getElementById('role-indicator');
            if(state.isBatting) { ind.innerText = "🏏 Batting"; ind.className = "w-full py-2 rounded-full text-center text-[10px] font-black uppercase tracking-[0.3em] bg-orange-600 text-white"; }
            else { ind.innerText = "🎾 Bowling"; ind.className = "w-full py-2 rounded-full text-center text-[10px] font-black uppercase tracking-[0.3em] bg-blue-600 text-white"; }
        }

        function checkWin() {
            if (state.target !== Infinity) {
                if (state.isBatting && state.uScore > state.target) endRound();
                if (!state.isBatting && state.cScore > state.target) endRound();
            }
        }

        function endRound() {
            document.getElementById('batting-area').classList.add('hidden');
            document.getElementById('rematch-area').classList.remove('hidden');
            const win = state.uScore > state.cScore;
            const circles = document.querySelectorAll('.round-circle');
            
            if(win) {
                series.uWins++;
                circles[series.current].classList.add('user-win');
            } else {
                series.cWins++;
                circles[series.current].classList.add('cpu-win');
            }
            
            series.current++;
            document.getElementById('winner-text').innerText = win ? "ROUND WON!" : "ROUND LOST!";
            document.getElementById('series-score').innerText = `YOU ${series.uWins} - ${series.cWins} CPU`;

            const winThreshold = Math.ceil(series.total / 2);
            if(series.uWins >= winThreshold || series.cWins >= winThreshold || series.current >= series.total) {
                document.getElementById('winner-text').innerText = series.uWins > series.cWins ? "SERIES WON!" : "SERIES LOST!";
                document.getElementById('next-round-btn').innerText = "PLAY AGAIN";
                document.getElementById('next-round-btn').onclick = () => location.reload();
            } else {
                document.getElementById('next-round-btn').onclick = nextRound;
            }
        }

        function nextRound() {
            state = { uScore: 0, cScore: 0, target: Infinity, isBatting: null, isMusic: state.isMusic, difficulty: state.difficulty };
            document.getElementById('rematch-area').classList.add('hidden');
            document.getElementById('target-box').classList.add('hidden');
            document.getElementById('toss-area').classList.remove('hidden');
            document.getElementById('toss-area').innerHTML = `<button onclick="runToss('Heads')" class="bg-orange-600 flex-1 py-5 rounded-3xl font-black text-white">HEADS</button><button onclick="runToss('Tails')" class="bg-white flex-1 py-5 rounded-3xl font-black text-black">TAILS</button>`;
            updateUI();
        }
    </script>
</body>
                        </html>
