<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Fingering by Jarrar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Syncopate:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; height: 100vh; overflow: hidden; margin: 0; }
        
        .gradient-title {
            background: linear-gradient(135deg, #ff7e00, #ff4500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Bungee', cursive;
        }

        .gradient-white {
            background: linear-gradient(180deg, #ffffff, #b0b0b0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Syncopate', sans-serif;
        }

        /* Pitch Aesthetics */
        .cartoon-pitch {
            background: #4caf50;
            background-image: radial-gradient(#55bd59 20%, transparent 20%), radial-gradient(#55bd59 20%, transparent 20%);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
            position: relative;
        }
        .pitch-center {
            position: absolute; width: 35%; height: 100%; top: 0; left: 32.5%;
            background: #e3c191; border-left: 5px solid rgba(255,255,255,0.2); border-right: 5px solid rgba(255,255,255,0.2);
        }

        /* UI Elements */
        .hand-btn { transition: all 0.2s; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(255,255,255,0.1); }
        .hand-btn:hover { transform: translateY(-5px); border-color: #ff7e00; background: rgba(255,126,0,0.2); }
        
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Powerplay Glow */
        .powerplay-mode { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }

        .ball {
            position: absolute; width: 25px; height: 25px; background: radial-gradient(circle at 30% 30%, #ff4d4d, #800000);
            border-radius: 50%; opacity: 0; pointer-events: none; z-index: 50;
        }
    </style>
</head>
<body class="cartoon-pitch">

    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg"></audio>
    <audio id="out-sfx"><source src="https://assets.mixkit.co/active_storage/sfx/2972/2972-preview.mp3" type="audio/mpeg"></audio>
    <audio id="crowd-sfx"><source src="https://assets.mixkit.co/active_storage/sfx/991/991-preview.mp3" type="audio/mpeg"></audio>
    <audio id="start-sfx"><source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg"></audio>

    <div id="loading-screen">
        <h1 class="gradient-title text-6xl mb-2 italic">CRICKET FINGERING</h1>
        <h2 class="gradient-white text-xl tracking-widest">BY JARRAR</h2>
        <div class="mt-10 w-48 h-1 bg-gray-800 rounded-full overflow-hidden">
            <div id="load-bar" class="h-full bg-orange-500 w-0 transition-all duration-300"></div>
        </div>
        <button id="start-btn" class="hidden mt-8 px-10 py-3 bg-orange-600 text-white font-bold rounded-full animate-bounce">START GAME</button>
    </div>

    <div id="name-modal" class="hidden fixed inset-0 bg-black/90 z-[500] flex items-center justify-center">
        <div class="bg-gray-900 p-8 rounded-3xl border-2 border-orange-500 text-center">
            <h2 class="text-2xl font-bold mb-4 text-orange-400">ENTER YOUR TEAM NAME</h2>
            <input type="text" id="team-input" class="bg-black border border-gray-700 p-3 rounded-lg w-full text-white text-center mb-6 focus:outline-none focus:border-orange-500" placeholder="e.g. Lynx Warriors">
            <button onclick="saveTeamName()" class="bg-orange-500 px-8 py-2 rounded-full font-bold">LET'S PLAY</button>
        </div>
    </div>

    <div class="absolute top-0 w-full p-4 flex justify-between items-start z-50">
        <div class="bg-black/60 p-3 rounded-xl border border-white/10">
            <p id="display-team-name" class="text-orange-400 text-xs font-bold uppercase tracking-widest">TEAM</p>
            <h2 id="user-score-ui" class="text-4xl font-black">0</h2>
        </div>
        <div class="flex flex-col items-end gap-2">
            <button onclick="toggleMusic()" class="bg-white/10 p-2 rounded-full hover:bg-white/20 transition">
                <span id="music-icon" class="text-xl">🔊</span>
            </button>
            <div id="target-box" class="hidden bg-yellow-500 text-black px-4 py-1 rounded-lg font-bold">Target: 0</div>
        </div>
    </div>

    <div class="pitch-center"></div>

    <div class="h-full flex flex-col pt-24">
        <div class="flex-1 flex flex-col items-center justify-center relative">
            <div id="cpu-action-box" class="bg-black/40 backdrop-blur-sm p-4 rounded-2xl border border-white/5 text-center">
                <p class="text-[10px] uppercase text-white/50 mb-1">Computer Move</p>
                <div id="cpu-hand" class="text-6xl">🤖</div>
            </div>
            <div id="cpu-score-box" class="mt-4 text-white/40 font-bold">CPU: <span id="cpu-score-ui">0</span></div>
        </div>

        <div id="status-bar" class="h-12 bg-white/5 flex items-center justify-center border-y border-white/10">
            <p id="game-info" class="font-bold text-sm tracking-tighter text-orange-200">WAITING FOR TOSS...</p>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center pb-8 px-4">
            <div id="toss-area" class="text-center">
                <div class="flex gap-4">
                    <button onclick="runToss('Heads')" class="bg-orange-500 px-8 py-3 rounded-full font-black text-black shadow-lg">HEADS</button>
                    <button onclick="runToss('Tails')" class="bg-white px-8 py-3 rounded-full font-black text-black shadow-lg">TAILS</button>
                </div>
            </div>

            <div id="batting-area" class="hidden w-full max-w-md">
                <div class="grid grid-cols-5 gap-2" id="moves-grid"></div>
            </div>
        </div>
    </div>

    <div id="out-modal" class="hidden fixed inset-0 bg-black/80 z-[1000] flex items-center justify-center p-4">
        <div class="bg-gray-900 border-t-8 border-orange-600 p-8 rounded-b-3xl text-center max-w-sm w-full">
            <h1 class="text-6xl font-black text-white mb-2 italic">OUT!</h1>
            <p id="out-message" class="text-gray-400 mb-6 font-medium uppercase tracking-widest text-sm"></p>
            <button onclick="closeOutModal()" class="w-full bg-orange-600 py-4 rounded-xl font-bold text-xl shadow-orange-900/50 shadow-lg">CONTINUE</button>
        </div>
    </div>

    <div id="ball" class="ball"></div>

    <script>
        const moves = [
            { val: 1, img: "☝️" }, { val: 2, img: "✌️" }, { val: 3, img: "🤟" },
            { val: 4, img: "🖖" }, { val: 5, img: "🖐️" }, { val: 6, img: "👍" },
            { val: 10, img: "✊" }, { val: 20, img: "👎" }, { val: 50, img: "🤙" },
            { val: 100, img: "☝🏻👍" }
        ];

        let state = {
            teamName: localStorage.getItem('cricketTeamName') || "",
            userScore: 0, cpuScore: 0,
            target: Infinity,
            isUserBatting: null,
            isGameOver: false,
            musicOn: true,
            powerplay: false
        };

        // --- Init Loading ---
        window.onload = () => {
            let bar = document.getElementById('load-bar');
            let progress = 0;
            let interval = setInterval(() => {
                progress += Math.random() * 15;
                bar.style.width = Math.min(progress, 100) + "%";
                if (progress >= 100) {
                    clearInterval(interval);
                    document.getElementById('start-btn').classList.remove('hidden');
                }
            }, 200);
        };

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('start-sfx').play();
            if (state.musicOn) document.getElementById('bg-music').play();
            
            if (!state.teamName) {
                document.getElementById('name-modal').classList.remove('hidden');
            } else {
                updateTeamDisplay();
            }
        };

        function saveTeamName() {
            let val = document.getElementById('team-input').value.trim();
            if (val) {
                state.teamName = val;
                localStorage.setItem('cricketTeamName', val);
                document.getElementById('name-modal').classList.add('hidden');
                updateTeamDisplay();
            }
        }

        function updateTeamDisplay() {
            document.getElementById('display-team-name').innerText = state.teamName;
        }

        function toggleMusic() {
            state.musicOn = !state.musicOn;
            const music = document.getElementById('bg-music');
            const icon = document.getElementById('music-icon');
            if (state.musicOn) { music.play(); icon.innerText = "🔊"; }
            else { music.pause(); icon.innerText = "🔇"; icon.classList.add('opacity-50'); }
        }

        // --- Toss ---
        function runToss(choice) {
            const coin = Math.random() < 0.5 ? 'Heads' : 'Tails';
            const won = choice === coin;
            document.getElementById('toss-area').innerHTML = won ? 
                `<div class='flex gap-2'><button onclick='setPhase(true)' class='bg-green-500 px-6 py-2 rounded-full font-bold'>BAT</button>
                 <button onclick='setPhase(false)' class='bg-blue-500 px-6 py-2 rounded-full font-bold'>BOWL</button></div>` :
                `<button onclick='setPhase(${Math.random() < 0.5})' class='bg-orange-500 px-6 py-2 rounded-full font-bold'>CPU WON TOSS - CONTINUE</button>`;
            
            document.getElementById('game-info').innerText = `${coin}! ${won ? 'YOU WON THE TOSS' : 'CPU WON THE TOSS'}`;
        }

        function setPhase(batting) {
            state.isUserBatting = batting;
            document.getElementById('toss-area').classList.add('hidden');
            document.getElementById('batting-area').classList.remove('hidden');
            renderMoves();
            updateUI();
        }

        function renderMoves() {
            const grid = document.getElementById('moves-grid');
            grid.innerHTML = moves.map(m => `
                <button onclick="playTurn(${m.val})" class="hand-btn p-3 rounded-xl">
                    <span class="text-3xl block">${m.img}</span>
                    <span class="text-[10px] font-bold text-white/40">${m.val}</span>
                </button>
            `).join('');
        }

        // --- Play ---
        function playTurn(userMove) {
            if (state.isGameOver) return;
            
            // AI logic: High risk if score is high
            const userMoveObj = moves.find(m => m.val === userMove);
            const cpuMatches = Math.random() < (userMove > 10 ? 0.15 : 0.05); 
            const cpuMoveObj = cpuMatches ? userMoveObj : moves[Math.floor(Math.random() * moves.length)];
            const cpuMove = cpuMoveObj.val;

            document.getElementById('cpu-hand').innerText = cpuMoveObj.img;

            if (userMove === cpuMove) {
                triggerOut();
            } else {
                let points = state.isUserBatting ? userMove : cpuMove;
                
                // Random Powerplay Thrill
                if (!state.powerplay && Math.random() < 0.1) {
                    state.powerplay = true;
                    document.body.classList.add('powerplay-mode');
                    document.getElementById('game-info').innerText = "POWERPLAY! DOUBLE RUNS!";
                    setTimeout(() => { 
                        state.powerplay = false; 
                        document.body.classList.remove('powerplay-mode');
                    }, 3000);
                }

                if (state.powerplay) points *= 2;
                
                if (state.isUserBatting) state.userScore += points;
                else state.cpuScore += points;

                if (points >= 6) document.getElementById('crowd-sfx').play();
                animateBall(points);
                updateUI();
                checkWin();
            }
        }

        function triggerOut() {
            document.getElementById('out-sfx').play();
            const msg = state.isUserBatting ? 
                "CPU matched your move. Switching sides." : 
                "You guessed computer's move. Switching sides";
            document.getElementById('out-message').innerText = msg;
            document.getElementById('out-modal').classList.remove('hidden');
        }

        function closeOutModal() {
            document.getElementById('out-modal').classList.add('hidden');
            if (state.target === Infinity) {
                state.target = state.isUserBatting ? state.userScore : state.cpuScore;
                state.isUserBatting = !state.isUserBatting;
                document.getElementById('target-box').innerText = `Target: ${state.target + 1}`;
                document.getElementById('target-box').classList.remove('hidden');
                updateUI();
            } else {
                endGame();
            }
        }

        function animateBall(runs) {
            const ball = document.getElementById('ball');
            ball.style.opacity = "1";
            ball.style.bottom = "20%";
            ball.style.left = "50%";
            
            let height = runs >= 6 ? "-300px" : "-100px";
            ball.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(${Math.random()*200 - 100}px, ${height}) scale(0.5)`, opacity: 0 }
            ], { duration: 600, easing: 'ease-out' });
        }

        function updateUI() {
            document.getElementById('user-score-ui').innerText = state.isUserBatting ? state.userScore : state.cpuScore;
            document.getElementById('cpu-score-ui').innerText = state.isUserBatting ? state.cpuScore : state.userScore;
            document.getElementById('game-info').innerText = state.isUserBatting ? "YOU ARE BATTING" : "YOU ARE BOWLING";
        }

        function checkWin() {
            if (state.target !== Infinity) {
                if (state.isUserBatting && state.userScore > state.target) endGame();
                if (!state.isUserBatting && state.cpuScore > state.target) endGame();
            }
        }

        function endGame() {
            state.isGameOver = true;
            const won = state.userScore > state.cpuScore;
            document.getElementById('batting-area').innerHTML = `
                <div class="text-center">
                    <h1 class="text-4xl font-black gradient-title">${won ? 'VICTORY!' : 'DEFEAT!'}</h1>
                    <button onclick="location.reload()" class="mt-4 bg-white text-black px-8 py-2 rounded-full font-bold">REPLAY</button>
                </div>
            `;
        }
    </script>
</body>
</html>
