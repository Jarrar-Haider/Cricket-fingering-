<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Fingering by Jarrar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Syncopate:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; height: 100vh; overflow: hidden; margin: 0; }
        
        .gradient-title {
            background: linear-gradient(135deg, #ff7e00, #ff4500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Bungee', cursive;
        }

        /* Stadium Layout */
        .stadium { position: relative; width: 100%; height: 100%; background: #4caf50; display: flex; overflow: hidden; }
        
        .sideline-crowd { 
            width: 12%; height: 100%; display: flex; flex-direction: column; 
            justify-content: space-around; align-items: center; font-size: 1.8rem; 
            background: rgba(0,0,0,0.15); z-index: 10; border: 2px solid rgba(255,255,255,0.05);
        }

        .pitch-center {
            flex: 1; position: relative; background: #e3c191;
            border-left: 10px solid rgba(255,255,255,0.3); border-right: 10px solid rgba(255,255,255,0.3);
            z-index: 5;
        }

        .ui-layer { position: absolute; inset: 0; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }

        .hand-btn { transition: all 0.2s; background: rgba(0, 0, 0, 0.8); border: 2px solid #ff7e00; }
        .hand-btn:hover { transform: scale(1.1); background: #ff7e00; color: black; box-shadow: 0 0 15px #ff7e00; }
        
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .ball {
            position: absolute; width: 22px; height: 22px; background: radial-gradient(circle at 30% 30%, #ff4d4d, #800000);
            border-radius: 50%; opacity: 0; z-index: 80; pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .crowd-jump { animation: jump 0.4s infinite alternate; }
        @keyframes jump { from { transform: translateY(0); } to { transform: translateY(-12px); } }
    </style>
</head>
<body>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3"></audio>
    <audio id="sfx-out" src="https://assets.mixkit.co/active_storage/sfx/2972/2972-preview.mp3"></audio>
    <audio id="sfx-cheer" src="https://assets.mixkit.co/active_storage/sfx/991/991-preview.mp3"></audio>

    <div id="loading-screen">
        <h1 class="gradient-title text-7xl italic text-center">CRICKET<br>FINGERING</h1>
        <p class="text-white tracking-[0.6em] mt-4 font-bold opacity-80">BY JARRAR</p>
        <button id="start-btn" class="mt-14 px-16 py-5 bg-orange-600 text-white font-black rounded-full shadow-2xl hover:bg-orange-500 transition-all uppercase text-xl">Enter Pitch</button>
    </div>

    <div class="stadium">
        <div class="sideline-crowd" id="left-crowd"></div>
        <div class="pitch-center"><div id="ball" class="ball"></div></div>
        <div class="sideline-crowd" id="right-crowd"></div>

        <div class="ui-layer flex flex-col">
            <div class="p-6 flex justify-between items-start">
                <div class="bg-black/90 p-4 rounded-xl border-2 border-orange-500 clickable">
                    <p id="team-name-ui" class="text-orange-400 text-xs font-black uppercase tracking-widest mb-1">TEAM</p>
                    <h2 id="score-ui" class="text-5xl font-black text-white">0</h2>
                </div>
                <div class="flex flex-col items-end gap-4">
                    <button id="mute-btn" onclick="toggleMute()" class="bg-black/90 p-4 rounded-full border border-white/20 clickable shadow-lg">
                        <span id="mute-icon" class="text-2xl">🔊</span>
                    </button>
                    <div id="target-ui" class="hidden bg-yellow-400 text-black px-6 py-2 rounded-lg font-black text-lg border-2 border-black">Target: 0</div>
                </div>
            </div>

            <div class="flex-1 flex flex-col items-center justify-around pb-12">
                <div class="text-center">
                    <div class="bg-black/80 p-6 rounded-full border-4 border-red-600/50 shadow-2xl inline-block">
                        <div id="cpu-hand" class="text-8xl">😈</div>
                    </div>
                    <p class="text-white font-black mt-4 bg-black/40 px-6 py-1 rounded-full text-xl">CPU SCORE: <span id="cpu-score-ui" class="text-orange-500">0</span></p>
                </div>

                <div id="game-status" class="bg-orange-500 text-black px-12 py-3 font-black italic rounded-full uppercase text-2xl shadow-2xl border-4 border-black/20">
                    MATCH STARTING...
                </div>

                <div class="w-full max-w-xl px-6">
                    <div id="toss-controls" class="flex gap-6 justify-center clickable">
                        <button onclick="handleToss('Heads')" class="bg-white text-black px-12 py-4 rounded-full font-black text-xl hover:scale-105 transition shadow-xl">HEADS</button>
                        <button onclick="handleToss('Tails')" class="bg-orange-500 text-black px-12 py-4 rounded-full font-black text-xl hover:scale-105 transition shadow-xl">TAILS</button>
                    </div>

                    <div id="hand-grid" class="hidden grid grid-cols-5 gap-3 w-full clickable">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="out-modal" class="hidden fixed inset-0 bg-black/95 z-[500] flex items-center justify-center p-6">
        <div class="bg-gray-900 border-4 border-orange-600 p-12 rounded-[3rem] text-center max-w-md shadow-2xl">
            <h1 class="text-7xl font-black text-white mb-6 italic uppercase">OUT!</h1>
            <p id="out-msg" class="text-orange-400 mb-10 font-black text-xl tracking-wide"></p>
            <button onclick="proceed()" class="w-full bg-orange-600 py-5 rounded-2xl font-black text-2xl text-white shadow-xl hover:bg-orange-500 clickable">CONTINUE</button>
        </div>
    </div>

    <script>
        const moveSet = [
            {v: 1, e: "☝️"}, {v: 2, e: "✌️"}, {v: 3, e: "🤟"}, {v: 4, e: "🖖"}, {v: 5, e: "🖐️"},
            {v: 6, e: "👍"}, {v: 10, e: "✊"}, {v: 20, e: "👎"}, {v: 50, e: "🤙"}, {v: 100, e: "☝🏻👍"}
        ];

        let game = {
            uScore: 0, cScore: 0, target: Infinity,
            isBatting: true, isMuted: false, over: false,
            team: prompt("Enter Your Team Name:") || "Jarrar Warriors"
        };

        const audio = {
            bg: document.getElementById('bg-music'),
            out: document.getElementById('sfx-out'),
            cheer: document.getElementById('sfx-cheer')
        };

        // Crowd Generation
        const emojis = ["👦", "👨", "👧", "👩", "👳", "👶", "🦸", "😎"];
        function spawnCrowd(id) {
            const side = document.getElementById(id);
            for(let i=0; i<18; i++) {
                let d = document.createElement('div');
                d.innerText = emojis[Math.floor(Math.random()*emojis.length)];
                if(Math.random() > 0.4) d.className = "crowd-jump";
                side.appendChild(d);
            }
        }
        spawnCrowd('left-crowd'); spawnCrowd('right-crowd');

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('loading-screen').remove();
            document.getElementById('team-name-ui').innerText = game.team;
            audio.bg.play().catch(() => {});
            document.getElementById('game-status').innerText = "Select Heads or Tails";
        };

        function toggleMute() {
            game.isMuted = !game.isMuted;
            document.getElementById('mute-icon').innerText = game.isMuted ? "🔇" : "🔊";
            game.isMuted ? audio.bg.pause() : audio.bg.play();
        }

        function handleToss(choice) {
            const result = Math.random() < 0.5 ? 'Heads' : 'Tails';
            const won = result === choice;
            document.getElementById('toss-controls').classList.add('hidden');
            document.getElementById('hand-grid').classList.remove('hidden');
            game.isBatting = won ? true : Math.random() < 0.5;
            document.getElementById('game-status').innerText = game.isBatting ? "YOU ARE BATTING" : "YOU ARE BOWLING";
            initMoves();
        }

        function initMoves() {
            const grid = document.getElementById('hand-grid');
            grid.innerHTML = moveSet.map(m => `
                <button onclick="playMove(${m.v})" class="hand-btn p-4 rounded-2xl text-white font-black text-lg">
                    <span class="text-3xl block mb-1">${m.e}</span>${m.v}
                </button>
            `).join('');
        }

        function playMove(uVal) {
            if (game.over) return;
            const cVal = moveSet[Math.floor(Math.random()*moveSet.length)].v;
            document.getElementById('cpu-hand').innerText = moveSet.find(m => m.v === cVal).e;

            if (uVal === cVal) {
                audio.out.play();
                document.getElementById('out-msg').innerText = game.isBatting ? "DEVIL MATCHED YOUR MOVE!" : "YOU CAUGHT THE DEVIL!";
                document.getElementById('out-modal').classList.remove('hidden');
            } else {
                let scored = game.isBatting ? uVal : cVal;
                game.isBatting ? (game.uScore += scored) : (game.cScore += scored);
                if (scored >= 50) audio.cheer.play();
                ballBlast();
                refreshUI();
                checkLogic();
            }
        }

        function proceed() {
            document.getElementById('out-modal').classList.add('hidden');
            if (game.target === Infinity) {
                game.target = game.isBatting ? game.uScore : game.cScore;
                game.isBatting = !game.isBatting;
                document.getElementById('target-ui').innerText = "TARGET: " + (game.target + 1);
                document.getElementById('target-ui').classList.remove('hidden');
                refreshUI();
            } else {
                alert(game.uScore > game.cScore ? "MATCH OVER: " + game.team + " WON!" : "MATCH OVER: DEVIL WON!");
                location.reload();
            }
        }

        function refreshUI() {
            document.getElementById('score-ui').innerText = game.isBatting ? game.uScore : game.cScore;
            document.getElementById('cpu-score-ui').innerText = game.isBatting ? game.cScore : game.uScore;
            document.getElementById('game-status').innerText = game.isBatting ? "BATTING" : "BOWLING";
        }

        function ballBlast() {
            const b = document.getElementById('ball');
            b.style.opacity = 1;
            b.animate([
                {bottom:'20%', left:'50%', scale:1, opacity:1},
                {bottom:'85%', left: (Math.random()*80 + 10)+'%', scale:0.3, opacity:0}
            ], {duration: 500, easing: 'ease-out'});
        }

        function checkLogic() {
            if (game.target !== Infinity) {
                if (game.isBatting && game.uScore > game.target) proceed();
                if (!game.isBatting && game.cScore > game.target) proceed();
            }
        }
    </script>
</body>
</html>
