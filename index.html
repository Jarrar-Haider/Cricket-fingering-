<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Fingering by Jarrar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Syncopate:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; height: 100vh; overflow: hidden; margin: 0; }
        
        .gradient-title {
            background: linear-gradient(135deg, #ff7e00, #ff4500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Bungee', cursive;
        }

        .cartoon-pitch {
            background: #4caf50;
            background-image: radial-gradient(#55bd59 20%, transparent 20%), radial-gradient(#55bd59 20%, transparent 20%);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
            position: relative;
            z-index: 1;
        }

        .pitch-center {
            position: absolute; width: 35%; height: 100%; top: 0; left: 32.5%;
            background: #e3c191; border-left: 5px solid rgba(255,255,255,0.2); border-right: 5px solid rgba(255,255,255,0.2);
            z-index: 2;
        }

        .front-ui { position: relative; z-index: 50; }

        .hand-btn { transition: all 0.2s; background: rgba(0, 0, 0, 0.7); border: 2px solid rgba(255,126,0,0.5); }
        .hand-btn:hover { transform: translateY(-5px); border-color: #ff7e00; background: rgba(255,126,0,0.3); }
        
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .ball {
            position: absolute; width: 25px; height: 25px; background: radial-gradient(circle at 30% 30%, #ff4d4d, #800000);
            border-radius: 50%; opacity: 0; pointer-events: none; z-index: 60;
        }
    </style>
</head>
<body class="cartoon-pitch">

    <audio id="bg-music" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3" type="audio/mpeg">
    </audio>
    <audio id="out-sfx" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2972/2972-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="cheer-sfx" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/991/991-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="loading-screen">
        <h1 class="gradient-title text-7xl mb-2 italic text-center">CRICKET<br>FINGERING</h1>
        <h2 class="text-white text-xl tracking-widest uppercase opacity-70">BY JARRAR</h2>
        <div class="mt-10 w-48 h-1 bg-gray-800 rounded-full overflow-hidden">
            <div id="load-bar" class="h-full bg-orange-500 w-0 transition-all duration-300"></div>
        </div>
        <button id="start-btn" class="hidden mt-8 px-10 py-3 bg-orange-600 text-white font-black rounded-full shadow-2xl animate-bounce">START GAME</button>
    </div>

    <div id="name-modal" class="hidden fixed inset-0 bg-black/95 z-[500] flex items-center justify-center">
        <div class="bg-gray-900 p-8 rounded-3xl border-2 border-orange-500 text-center">
            <h2 class="text-2xl font-bold mb-4 text-orange-400">TEAM NAME</h2>
            <input type="text" id="team-input" class="bg-black border border-gray-700 p-3 rounded-lg w-full text-white text-center mb-6 focus:outline-none focus:border-orange-500" placeholder="Enter Team Name">
            <button onclick="saveTeamName()" class="bg-orange-500 px-8 py-2 rounded-full font-bold text-black uppercase">Let's Play</button>
        </div>
    </div>

    <div class="absolute top-0 w-full p-4 flex justify-between items-start z-50">
        <div class="bg-black/80 p-3 rounded-xl border border-white/20">
            <p id="display-team-name" class="text-orange-400 text-xs font-bold uppercase tracking-widest">TEAM</p>
            <h2 id="user-score-ui" class="text-4xl font-black text-white">0</h2>
        </div>
        <div class="flex flex-col items-end gap-2">
            <button onclick="toggleMusic()" class="bg-black/60 p-3 rounded-full border border-white/10 clickable shadow-xl">
                <span id="music-icon" class="text-xl">🔊</span>
            </button>
            <div id="target-box" class="hidden bg-yellow-500 text-black px-4 py-1 rounded-lg font-bold border-2 border-black">Target: 0</div>
        </div>
    </div>

    <div class="pitch-center"></div>

    <div class="h-full flex flex-col pt-24 front-ui">
        <div class="flex-1 flex flex-col items-center justify-center">
            <div class="bg-black/60 p-5 rounded-3xl border border-orange-500/30 text-center shadow-2xl">
                <p class="text-[10px] uppercase text-white/50 mb-1 font-bold">Devil's Move</p>
                <div id="cpu-hand" class="text-7xl">😈</div>
            </div>
            <div id="cpu-score-box" class="mt-4 text-white font-bold bg-black/50 px-6 py-1 rounded-full border border-white/5">CPU: <span id="cpu-score-ui">0</span></div>
        </div>

        <div id="status-bar" class="h-14 bg-black/60 flex items-center justify-center border-y border-white/10">
            <p id="game-info" class="font-bold text-lg tracking-tight text-orange-400 italic uppercase">Waiting for Toss...</p>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center pb-8 px-4">
            <div id="toss-area" class="text-center">
                <div class="flex gap-4">
                    <button onclick="runToss('Heads')" class="bg-orange-500 px-10 py-4 rounded-full font-black text-black shadow-2xl">HEADS</button>
                    <button onclick="runToss('Tails')" class="bg-white px-10 py-4 rounded-full font-black text-black shadow-2xl">TAILS</button>
                </div>
            </div>

            <div id="batting-area" class="hidden w-full max-w-md">
                <div class="grid grid-cols-5 gap-2" id="moves-grid"></div>
            </div>

            <div id="rematch-area" class="hidden text-center">
                <h1 id="winner-text" class="text-5xl font-black gradient-title mb-6"></h1>
                <button onclick="location.reload()" class="bg-orange-600 px-12 py-4 rounded-full font-black text-xl shadow-lg">REMATCH</button>
            </div>
        </div>
    </div>

    <div id="out-modal" class="hidden fixed inset-0 bg-black/98 z-[1000] flex items-center justify-center p-4">
        <div class="bg-gray-900 border-t-8 border-orange-600 p-8 rounded-b-3xl text-center max-w-sm w-full shadow-2xl">
            <h1 class="text-6xl font-black text-white mb-2 italic uppercase">OUT!</h1>
            <p id="out-message" class="text-orange-400 mb-6 font-bold uppercase tracking-widest text-sm"></p>
            <button onclick="closeOutModal()" class="w-full bg-orange-600 py-4 rounded-xl font-bold text-xl text-white shadow-lg uppercase">Continue</button>
        </div>
    </div>

    <div id="ball" class="ball"></div>

    <script>
        const moves = [
            { val: 1, img: "☝️" }, { val: 2, img: "✌️" }, { val: 3, img: "🤟" },
            { val: 4, img: "🖖" }, { val: 5, img: "🖐️" }, { val: 6, img: "👍" },
            { val: 10, img: "✊" }, { val: 20, img: "👎" }, { val: 50, img: "🤙" },
            { val: 100, img: "☝🏻👍" }
        ];

        let state = {
            teamName: localStorage.getItem('cricketTeamName') || "",
            uScore: 0, cScore: 0, target: Infinity,
            batting: null, music: true
        };

        const aud = {
            bg: document.getElementById('bg-music'),
            out: document.getElementById('out-sfx'),
            cheer: document.getElementById('cheer-sfx')
        };

        window.onload = () => {
            let progress = 0;
            let bar = document.getElementById('load-bar');
            let itv = setInterval(() => {
                progress += 10;
                bar.style.width = progress + "%";
                if (progress >= 100) { clearInterval(itv); document.getElementById('start-btn').classList.remove('hidden'); }
            }, 50);
        };

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('loading-screen').remove();
            if (state.music) playAudio(aud.bg);
            if (!state.teamName) document.getElementById('name-modal').classList.remove('hidden');
            else updateTeamDisplay();
        };

        function saveTeamName() {
            let val = document.getElementById('team-input').value.trim();
            if (val) {
                state.teamName = val;
                localStorage.setItem('cricketTeamName', val);
                document.getElementById('name-modal').classList.add('hidden');
                updateTeamDisplay();
            }
        }

        function updateTeamDisplay() { document.getElementById('display-team-name').innerText = state.teamName; }

        function playAudio(element) {
            if (!state.music) return;
            element.currentTime = 0;
            element.play().catch(e => console.log("Audio play blocked"));
        }

        function toggleMusic() {
            state.music = !state.music;
            const icon = document.getElementById('music-icon');
            if (!state.music) {
                aud.bg.pause();
                aud.out.pause();
                aud.cheer.pause();
                icon.innerText = "🔇";
            } else {
                aud.bg.play();
                icon.innerText = "🔊";
            }
        }

        function runToss(choice) {
            const coin = Math.random() < 0.5 ? 'Heads' : 'Tails';
            const won = choice === coin;
            document.getElementById('toss-area').innerHTML = won ? 
                `<div class='flex gap-4'><button onclick='setPhase(true)' class='bg-green-500 px-8 py-3 rounded-full font-bold text-black shadow-lg'>BAT FIRST</button>
                 <button onclick='setPhase(false)' class='bg-blue-500 px-8 py-3 rounded-full font-bold text-white shadow-lg'>BOWL FIRST</button></div>` :
                `<button onclick='setPhase(${Math.random() < 0.5})' class='bg-orange-500 px-8 py-3 rounded-full font-black text-black'>CONTINUE</button>`;
            document.getElementById('game-info').innerText = won ? "YOU WON THE TOSS!" : "CPU WON THE TOSS!";
        }

        function setPhase(b) {
            state.batting = b;
            document.getElementById('toss-area').classList.add('hidden');
            document.getElementById('batting-area').classList.remove('hidden');
            renderMoves();
            updateUI();
        }

        function renderMoves() {
            document.getElementById('moves-grid').innerHTML = moves.map(m => `
                <button onclick="playTurn(${m.val})" class="hand-btn p-3 rounded-xl text-white">
                    <span class="text-3xl block">${m.img}</span>
                    <span class="text-[10px] font-bold opacity-50">${m.val}</span>
                </button>
            `).join('');
        }

        function playTurn(uMove) {
            const cMove = moves[Math.floor(Math.random() * moves.length)].val;
            document.getElementById('cpu-hand').innerText = moves.find(m => m.val === cMove).img;

            if (uMove === cMove) {
                playAudio(aud.out);
                const msg = state.batting ? 
                    "OUT!<br>Computer matched your move. Switching sides." : 
                    "OUT!<br>You guessed computer's move. Switching sides";
                document.getElementById('out-message').innerHTML = msg;
                document.getElementById('out-modal').classList.remove('hidden');
            } else {
                let runs = state.batting ? uMove : cMove;
                state.batting ? state.uScore += runs : state.cScore += runs;
                if (runs >= 50) playAudio(aud.cheer);
                animateBall();
                updateUI();
                checkWin();
            }
        }

        function closeOutModal() {
            document.getElementById('out-modal').classList.add('hidden');
            if (state.target === Infinity) {
                state.target = state.batting ? state.uScore : state.cScore;
                state.batting = !state.batting;
                document.getElementById('target-box').innerText = `Target: ${state.target + 1}`;
                document.getElementById('target-box').classList.remove('hidden');
                updateUI();
            } else { endGame(); }
        }

        function animateBall() {
            const ball = document.getElementById('ball');
            ball.style.opacity = "1";
            ball.animate([
                { transform: 'translate(-50%, 0) scale(1)', bottom: '20%', left: '50%', opacity: 1 },
                { transform: 'translate(-50%, -200px) scale(0.2)', bottom: '70%', opacity: 0 }
            ], { duration: 500 });
        }

        function updateUI() {
            document.getElementById('user-score-ui').innerText = state.batting ? state.uScore : state.cScore;
            document.getElementById('cpu-score-ui').innerText = state.batting ? state.cScore : state.uScore;
            document.getElementById('game-info').innerText = state.batting ? "YOU ARE BATTING" : "YOU ARE BOWLING";
        }

        function checkWin() {
            if (state.target !== Infinity) {
                if (state.batting && state.uScore > state.target) endGame();
                if (!state.batting && state.cScore > state.target) endGame();
            }
        }

        function endGame() {
            document.getElementById('batting-area').classList.add('hidden');
            document.getElementById('rematch-area').classList.remove('hidden');
            const won = state.uScore > state.cScore;
            document.getElementById('winner-text').innerText = won ? "YOU WON!" : "CPU WON!";
            if(won) playAudio(aud.cheer);
        }
    </script>
</body>
</html>
