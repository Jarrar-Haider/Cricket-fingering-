<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Fingering by Jarrar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Syncopate:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #000; height: 100vh; overflow: hidden; margin: 0; }
        
        .gradient-title {
            background: linear-gradient(135deg, #ff7e00, #ff4500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Bungee', cursive;
        }

        .cartoon-pitch {
            background: #4caf50;
            background-image: radial-gradient(#55bd59 20%, transparent 20%), radial-gradient(#55bd59 20%, transparent 20%);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
            position: fixed; inset: 0; z-index: 0;
        }

        .pitch-center {
            position: absolute; width: 35%; height: 100%; top: 0; left: 32.5%;
            background: #e3c191; border-left: 5px solid rgba(255,255,255,0.1); border-right: 5px solid rgba(255,255,255,0.1);
            z-index: 1;
        }

        .front-ui { position: relative; z-index: 50; height: 100vh; display: flex; flex-direction: column; pointer-events: none; }
        .interactive { pointer-events: auto; }

        .hand-btn { transition: all 0.2s; background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(255,126,0,0.3); border-radius: 12px; }
        
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .diff-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .diff-card.active {
            background: rgba(255, 126, 0, 0.2);
            border-color: #ff7e00;
            box-shadow: 0 0 15px rgba(255, 126, 0, 0.3);
        }

        .role-batting { background: #ff7e00 !important; color: white !important; box-shadow: 0 4px 15px rgba(255,126,0,0.4); }
        .role-bowling { background: #007bff !important; color: white !important; box-shadow: 0 4px 15px rgba(0,123,255,0.4); }

        .ball {
            position: absolute; width: 20px; height: 20px; background: #ff4d4d;
            border-radius: 50%; opacity: 0; z-index: 40;
        }
    </style>
</head>
<body class="cartoon-pitch">
    <div class="pitch-center"></div>

    <audio id="bg-music" loop src="https://codeskulptor-demos.commondatastorage.googleapis.com/pang/pman_ow.mp3"></audio>
    <audio id="out-sfx" src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/Crumble%20Sound.mp3"></audio>

    <div id="loading-screen">
        <div class="text-center px-6">
            <h1 class="gradient-title text-6xl italic">CRICKET<br>FINGERING</h1>
            <p class="text-white opacity-40 text-[10px] tracking-[0.5em] font-bold mt-2 uppercase">By Jarrar</p>
        </div>
        <div class="mt-12 w-48 h-1 bg-gray-900 rounded-full overflow-hidden">
            <div id="load-bar" class="h-full bg-orange-600 w-0"></div>
        </div>
        <button id="start-btn" class="hidden mt-10 px-14 py-4 bg-orange-600 text-white font-black rounded-full shadow-2xl animate-pulse">START GAME</button>
    </div>

    <div id="setup-modal" class="hidden fixed inset-0 bg-black/98 z-[600] flex items-center justify-center p-6 backdrop-blur-2xl">
        <div class="w-full max-w-sm">
            <div class="text-center mb-8">
                <h2 class="text-orange-500 font-black italic text-2xl uppercase tracking-widest">DIFFICULTY</h2>
            </div>
            <div class="space-y-4">
                <div onclick="setDiff('easy', this)" class="diff-card p-4 rounded-2xl flex justify-between items-center interactive">
                    <div><h3 class="font-black text-white uppercase text-sm">Easy</h3><p class="text-[9px] text-white/40">20% Catch Risk</p></div>
                    <span class="text-xl">🍃</span>
                </div>
                <div onclick="setDiff('normal', this)" class="diff-card active p-4 rounded-2xl flex justify-between items-center interactive">
                    <div><h3 class="font-black text-white uppercase text-sm">Normal</h3><p class="text-[9px] text-white/40">Standard Play</p></div>
                    <span class="text-xl">⚡</span>
                </div>
                <div onclick="setDiff('hard', this)" class="diff-card p-4 rounded-2xl flex justify-between items-center interactive">
                    <div><h3 class="font-black text-white uppercase text-sm">Hard</h3><p class="text-[9px] text-white/40">80% Catch Risk</p></div>
                    <span class="text-xl">🔥</span>
                </div>
                <button id="final-start" class="bg-orange-600 w-full py-5 rounded-2xl font-black text-white uppercase tracking-widest mt-4">Play Now</button>
            </div>
        </div>
    </div>

    <div class="front-ui">
        <div class="p-4 space-y-3 interactive">
            <div id="role-indicator" class="w-full py-2 rounded-full text-center text-[10px] font-black uppercase tracking-[0.3em] bg-white/5 border border-white/10 text-white/40">
                Awaiting Toss...
            </div>
            <div class="flex justify-between items-center">
                <div class="bg-black/80 p-3 rounded-2xl border border-white/10">
                    <p class="text-orange-500 text-[10px] font-black uppercase">SCORE</p>
                    <h2 id="user-score-ui" class="text-4xl font-black text-white leading-none">0</h2>
                </div>
                <button onclick="toggleMusic()" class="bg-black/80 p-4 rounded-full border border-white/10">
                    <span id="music-icon" class="text-xl">🔊</span>
                </button>
            </div>
        </div>

        <div id="ball" class="ball"></div>

        <div class="flex-1 flex flex-col items-center justify-between pb-28">
            <div class="mt-4 text-center">
                <div class="bg-black/80 p-6 rounded-[2.5rem] border border-red-900/50">
                    <div id="cpu-hand" class="text-7xl">😈</div>
                </div>
                <div id="target-box" class="hidden mt-4 bg-yellow-500 text-black px-5 py-1 rounded-full font-black text-[10px] uppercase">Target: 0</div>
            </div>

            <div id="status-bar" class="w-full bg-black/90 py-5 border-y border-white/5 text-center interactive">
                <p id="game-info" class="font-black text-lg text-orange-500 italic uppercase">Toss Phase</p>
            </div>

            <div class="w-full max-w-sm px-6 mb-2 interactive">
                <div id="toss-area" class="flex gap-4">
                    <button onclick="runToss('Heads')" class="bg-orange-600 flex-1 py-5 rounded-3xl font-black text-white">HEADS</button>
                    <button onclick="runToss('Tails')" class="bg-white flex-1 py-5 rounded-3xl font-black text-black">TAILS</button>
                </div>
                <div id="batting-area" class="hidden grid grid-cols-5 gap-2"></div>
                <div id="rematch-area" class="hidden text-center">
                    <h1 id="winner-text" class="text-5xl font-black text-white mb-8 italic"></h1>
                    <button onclick="location.reload()" class="bg-orange-600 px-16 py-5 rounded-3xl font-black text-white">REMATCH</button>
                </div>
            </div>
        </div>
    </div>

    <div id="out-modal" class="hidden fixed inset-0 bg-black/95 z-[700] flex items-center justify-center p-6">
        <div class="bg-gray-900 border border-orange-600/30 p-10 rounded-[3rem] text-center w-full max-w-xs shadow-2xl">
            <h1 class="text-7xl font-black text-white mb-2 italic uppercase">OUT</h1>
            <p class="text-orange-500 mb-10 font-bold uppercase text-[10px]">Switching Sides</p>
            <button onclick="closeOutModal()" class="w-full bg-orange-600 py-5 rounded-2xl font-black text-lg text-white uppercase">Continue</button>
        </div>
    </div>

    <script>
        const moves = [
            { val: 1, img: "☝️" }, { val: 2, img: "✌️" }, { val: 3, img: "🤟" },
            { val: 4, img: "🖖" }, { val: 5, img: "🖐️" }, { val: 6, img: "👍" },
            { val: 10, img: "✊" }, { val: 20, img: "👎" }, { val: 50, img: "🤙" },
            { val: 100, img: "👆🏻" }
        ];

        let state = { uScore: 0, cScore: 0, target: Infinity, isBatting: null, isMusic: true, difficulty: 'normal' };
        const aud = { bg: document.getElementById('bg-music'), out: document.getElementById('out-sfx') };
        
        // 100% Volume
        aud.bg.volume = 1.0;
        aud.out.volume = 1.0;

        window.onload = () => {
            let p = 0;
            let itv = setInterval(() => {
                p += 10; document.getElementById('load-bar').style.width = p + "%";
                if(p >= 100) { clearInterval(itv); document.getElementById('start-btn').classList.remove('hidden'); }
            }, 30);
        };

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('loading-screen').remove();
            document.getElementById('setup-modal').classList.remove('hidden');
        };

        function setDiff(d, el) {
            state.difficulty = d;
            document.querySelectorAll('.diff-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        document.getElementById('final-start').onclick = () => {
            document.getElementById('setup-modal').classList.add('hidden');
            if(state.isMusic) {
                aud.bg.play().catch(e => console.error("Audio failed:", e));
            }
        };

        function toggleMusic() {
            state.isMusic = !state.isMusic;
            document.getElementById('music-icon').innerText = state.isMusic ? "🔊" : "🔇";
            state.isMusic ? aud.bg.play() : aud.bg.pause();
        }

        function runToss(choice) {
            const won = Math.random() < 0.5;
            document.getElementById('toss-area').innerHTML = won ? 
                `<button onclick='setPhase(true)' class='bg-green-600 flex-1 py-4 rounded-3xl font-black text-white text-xs'>BAT FIRST</button>
                 <button onclick='setPhase(false)' class='bg-blue-600 flex-1 py-4 rounded-3xl font-black text-white text-xs'>BOWL FIRST</button>` :
                `<button onclick='setPhase(${Math.random() < 0.5})' class='bg-orange-600 w-full py-4 rounded-3xl font-black text-white uppercase'>CPU TOOK TOSS - PLAY</button>`;
        }

        function setPhase(b) {
            state.isBatting = b;
            document.getElementById('toss-area').classList.add('hidden');
            document.getElementById('batting-area').classList.remove('hidden');
            document.getElementById('batting-area').innerHTML = moves.map(m => `
                <button onclick="playTurn(${m.val})" class="hand-btn py-4 active:scale-90 transition-all">
                    <span class="text-2xl block mb-1">${m.img}</span>
                    <span class="text-[8px] font-black text-orange-500">${m.val}</span>
                </button>
            `).join('');
            updateUI();
        }

        function getCPUMove(uMove) {
            let roll = Math.random();
            if (state.difficulty === 'easy' && roll > 0.2) {
                let filtered = moves.filter(m => m.val !== uMove);
                return filtered[Math.floor(Math.random() * filtered.length)].val;
            }
            if (state.difficulty === 'hard' && roll < 0.8) return uMove;
            return moves[Math.floor(Math.random() * moves.length)].val;
        }

        function playTurn(uMove) {
            const cMove = getCPUMove(uMove);
            document.getElementById('cpu-hand').innerText = moves.find(m => m.val === cMove).img;

            if (uMove === cMove) {
                // FORCED OUT SFX TRIGGER
                if(state.isMusic) { 
                    aud.out.currentTime = 0; 
                    aud.out.play(); 
                }
                document.getElementById('out-modal').classList.remove('hidden');
            } else {
                let r = state.isBatting ? uMove : cMove;
                state.isBatting ? state.uScore += r : state.cScore += r;
                ballHit(); updateUI(); checkWin();
            }
        }

        function ballHit() {
            const b = document.getElementById('ball');
            b.style.opacity = "1";
            b.animate([{ bottom: '20%', left: '50%', opacity: 1 }, { transform: 'scale(0)', bottom: '80%', opacity: 0 }], { duration: 400 });
        }

        function closeOutModal() {
            document.getElementById('out-modal').classList.add('hidden');
            if (state.target === Infinity) {
                state.target = state.isBatting ? state.uScore : state.cScore;
                state.isBatting = !state.isBatting;
                document.getElementById('target-box').innerText = `Target: ${state.target + 1}`;
                document.getElementById('target-box').classList.remove('hidden');
                updateUI();
            } else { endGame(); }
        }

        function updateUI() {
            document.getElementById('user-score-ui').innerText = state.isBatting ? state.uScore : state.cScore;
            const indicator = document.getElementById('role-indicator');
            const gameInfo = document.getElementById('game-info');
            
            if(state.isBatting) {
                indicator.innerText = "🏏 Batting";
                indicator.className = "w-full py-2 rounded-full text-center text-[10px] font-black uppercase tracking-[0.3em] role-batting";
                gameInfo.innerText = "BATTING ACTIVE";
            } else {
                indicator.innerText = "🎾 Bowling";
                indicator.className = "w-full py-2 rounded-full text-center text-[10px] font-black uppercase tracking-[0.3em] role-bowling";
                gameInfo.innerText = "BOWLING ACTIVE";
            }
        }

        function checkWin() {
            if (state.target !== Infinity) {
                if (state.isBatting && state.uScore > state.target) endGame();
                if (!state.isBatting && state.cScore > state.target) endGame();
            }
        }

        function endGame() {
            document.getElementById('batting-area').classList.add('hidden');
            document.getElementById('rematch-area').classList.remove('hidden');
            document.getElementById('winner-text').innerText = (state.uScore > state.cScore) ? "VICTORY" : "DEFEAT";
        }
    </script>
</body>
</html>
