<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Fingering by Jarrar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #2d5a27; height: 100vh; overflow: hidden; margin: 0; }
        
        /* Loading Screen Styling */
        #loading-screen {
            position: fixed; inset: 0; background: #1a1a1a; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #f97316; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-top: 2rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Text Gradient Styling */
        .gradient-title {
            background: linear-gradient(135deg, #fb923c, #c2410c); /* Orange Gradient */
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Bungee', cursive;
        }
        .gradient-subtitle {
            background: linear-gradient(135deg, #ffffff, #e0e0e0); /* White Gradient */
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Pitch Background and Dividers */
        .cartoon-pitch {
            background: #6ab04c;
            position: relative; overflow: hidden;
        }
        .pitch-center {
            position: absolute; width: 40%; height: 100%; top: 0; left: 30%;
            background: #d4ac7d;
            box-shadow: 10px 0px 30px rgba(0,0,0,0.1), -10px 0px 30px rgba(0,0,0,0.1);
        }
        .pitch-lines {
            position: absolute; width: 40%; height: 100%; top: 0; left: 30%;
            border-left: 4px solid rgba(255,255,255,0.3); border-right: 4px solid rgba(255,255,255,0.3);
        }
        .screen-divider {
            position: absolute; top: 50%; left: 0; width: 100%; height: 8px;
            background: linear-gradient(to right, rgba(255,255,255,0) 10%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 90%);
            transform: translateY(-50%);
        }

        /* Hand Button Styling */
        .hand-btn { transition: all 0.2s; background: rgba(255, 255, 255, 0.2); }
        .hand-btn:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.5); }
        .active-move { border-color: #fb923c !important; transform: scale(1.1); box-shadow: 0 0 15px rgba(251,146,60,0.7); }

        /* Animation: Ball Trajectory */
        .ball {
            position: absolute; width: 30px; height: 30px; background: red; border-radius: 50%;
            opacity: 0; transition: all 0.5s ease-out;
            bottom: 60%; left: 45%; /* Origin */
        }
        @keyframes flatBall { 
            0% { transform: translate(0,0) scale(1); opacity: 1; } 
            100% { transform: translate(150px, -50px) scale(0.6); opacity: 0; }
        }
        @keyframes highBall6 { 
            0% { transform: translate(0,0) scale(1); opacity: 1; } 
            50% { transform: translate(100px, -150px) scale(1.3); } 
            100% { transform: translate(200px, -100px) scale(0.6); opacity: 0; }
        }
        @keyframes superBall6Plus { 
            0% { transform: translate(0,0) scale(1); opacity: 1; } 
            50% { transform: translate(80px, -200px) scale(1.5); } 
            100% { transform: translate(160px, -150px) scale(0.6); opacity: 0; }
        }
    </style>
</head>
<body class="flex flex-col text-white">

    <div id="loading-screen">
        <div class="text-center">
            <h1 class="gradient-title text-5xl">Cricket Fingering</h1>
            <p class="gradient-subtitle text-xl font-bold">by Jarrar</p>
        </div>
        <div class="loader"></div>
    </div>

    <div class="flex-1 flex flex-col h-full cartoon-pitch">
        <div class="pitch-center"></div>
        <div class="pitch-lines"></div>

        <div class="flex-1 border-b-2 border-white/20 p-6 flex flex-col justify-between items-center text-center relative z-10">
            <div id="cpu-score-area">
                <p class="text-xs uppercase opacity-70 tracking-widest mb-1">CPU Score</p>
                <h1 class="title-font text-5xl font-black gradient-subtitle" id="scoreboard">0</h1>
                <p id="target-display" class="text-xl font-bold italic text-yellow-300 mt-2 hidden"></p>
            </div>
            
            <div id="toss-status-box" class="bg-black/60 p-3 rounded-full border border-orange-500/50">
                <p class="text-xs font-bold uppercase tracking-widest text-orange-400">Toss Time!</p>
                <p id="toss-result-text" class="text-md font-bold text-white"></p>
            </div>

            <div id="cpu-move-display" class="bg-white/10 p-4 rounded-xl text-center hidden">
                <p class="text-xs uppercase opacity-60">CPU Chose:</p>
                <div id="cpu-move-img" class="text-5xl mt-2">🤖</div>
            </div>
        </div>

        <div class="screen-divider"></div>

        <div class="flex-1 p-6 flex flex-col justify-end items-center relative z-10">
            
            <div id="toss-view" class="mb-10 text-center">
                <h2 class="text-3xl mb-6 gradient-title text-5xl">Heads or Tails?</h2>
                <div class="flex gap-4 justify-center">
                    <button onclick="playToss('Heads')" class="bg-orange-500 hover:bg-orange-400 px-8 py-3 rounded-full font-bold text-black transform scale-110">HEADS</button>
                    <button onclick="playToss('Tails')" class="bg-gray-300 hover:bg-white px-8 py-3 rounded-full font-bold text-black">TAILS</button>
                </div>
            </div>

            <div id="game-view" class="hidden w-full max-w-lg flex flex-col items-center gap-6">
                <div id="user-move-display" class="bg-white/20 p-4 rounded-xl text-center hidden mb-2 w-full">
                    <p class="text-xs uppercase opacity-60">You Chose:</p>
                    <div id="user-move-img" class="text-5xl mt-2">?</div>
                </div>

                <div class="grid grid-cols-5 gap-3 w-full" id="hand-options">
                    </div>
                
                <p id="instruction-text" class="text-xl font-bold text-center mt-2">Select a Move to start Batting!</p>
            </div>
        </div>

        <div id="game-ball" class="ball"></div>
    </div>

    <div id="out-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
        <div class="bg-[#1a1a1a] p-10 rounded-3xl border-4 border-red-600 text-center w-full max-w-sm">
            <h1 class="text-8xl font-black text-red-500 mb-6">OUT!</h1>
            <p class="text-xl text-white/80 mb-8">CPU matched your move. Switching sides.</p>
            <button onclick="handleNextInnings()" class="bg-red-600 px-10 py-3 rounded-full font-bold text-white text-xl">Continue</button>
        </div>
    </div>

    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>
    <audio id="out-sound"><source src="https://assets.mixkit.co/active_storage/sfx/2972/2972-preview.mp3" type="audio/mpeg"></audio>
    <audio id="crowd-sound"><source src="https://assets.mixkit.co/active_storage/sfx/991/991-preview.mp3" type="audio/mpeg"></audio>

    <script>
        // --- CONSTANTS & DATA ---
        const MOVES = [
            { val: 1, img: "☝️", risk: 1 }, { val: 2, img: "✌️", risk: 1.2 }, 
            { val: 3, img: "🤟", risk: 1.4 }, { val: 4, img: "🖖", risk: 1.6 }, 
            { val: 5, img: "🖐️", risk: 2 }, { val: 6, img: "👍", risk: 3 }, 
            { val: 10, img: "✊", risk: 4 }, { val: 20, img: "👎", risk: 5 }, 
            { val: 50, img: "🤙", risk: 6 }, { val: 100, img: "☝🏻👍", risk: 8 } 
        ];

        // --- GAME STATE ---
        let state = {
            loading: true,
            userScore: 0,
            cpuScore: 0,
            isUserBatting: null, // Set after toss
            target: Infinity,
            isGameOver: false,
            currentToss: null,
            userActiveMoveVal: null
        };

        // --- DOM ELEMENTS ---
        const el = {
            loading: document.getElementById('loading-screen'),
            tossView: document.getElementById('toss-view'),
            gameView: document.getElementById('game-view'),
            tossStatus: document.getElementById('toss-status-box'),
            tossText: document.getElementById('toss-result-text'),
            scoreboard: document.getElementById('scoreboard'),
            target: document.getElementById('target-display'),
            movesGrid: document.getElementById('hand-options'),
            instruction: document.getElementById('instruction-text'),
            ball: document.getElementById('game-ball'),
            outModal: document.getElementById('out-modal'),
            cpuMoveDiv: document.getElementById('cpu-move-display'),
            cpuMoveImg: document.getElementById('cpu-move-img'),
            userMoveDiv: document.getElementById('user-move-display'),
            userMoveImg: document.getElementById('user-move-img')
        };

        const audio = {
            music: document.getElementById('bg-music'),
            out: document.getElementById('out-sound'),
            crowd: document.getElementById('crowd-sound')
        };

        // --- INITIALIZATION ---
        // Load the moves grid immediately
        MOVES.forEach(m => {
            const btn = document.createElement('button');
            btn.className = "hand-btn p-3 rounded-2xl border-4 border-white/10 text-center flex flex-col items-center justify-center";
            btn.id = `btn-${m.val}`;
            btn.onclick = () => selectMove(m.val);
            btn.innerHTML = `<span class="text-4xl block">${m.img}</span><span class="text-sm font-black mt-1 text-white/70">${m.val}</span>`;
            el.movesGrid.appendChild(btn);
        });

        // Hide loader after a delay
        setTimeout(() => {
            state.loading = false;
            el.loading.style.display = 'none';
            // Start music (requires interaction, will play after first click)
            audio.music.play().catch(e => console.log("Music blocked by browser until interaction"));
        }, 3000); // 3-second delay

        // --- TOSS & STARTUP LOGIC ---
        function playToss(userChoice) {
            el.tossView.classList.add('hidden');
            const tossWins = Math.random() < 0.5;
            state.currentToss = tossWins ? 'User' : 'CPU';

            if (tossWins) {
                // User wins, show manual selection
                el.tossText.innerHTML = `<span class="text-green-400">YOU WON!</span> Decide your strategy below.`;
                showTossSelectionButtons();
            } else {
                // CPU wins, automated selection
                const cpuDecidesBat = Math.random() < 0.5;
                state.isUserBatting = !cpuDecidesBat;
                el.tossText.innerHTML = `<span class="text-red-400">CPU WON!</span> It decided to <span class="font-black text-yellow-300">${cpuDecidesBat ? 'BAT' : 'BOWL'}</span> first.`;
                initializeGameView();
            }
        }

        function showTossSelectionButtons() {
            // Replace move grid temporarily with decision buttons
            el.gameView.classList.remove('hidden');
            el.movesGrid.classList.add('hidden');
            el.instruction.innerText = "Congratulations! Choose your goal:";
            
            const btnClass = "bg-orange-500 text-black px-10 py-3 rounded-full font-bold text-lg w-full mb-4";
            el.movesGrid.parentNode.insertAdjacentHTML('beforeend', `
                <div id="temp-toss-choices" class="flex flex-col gap-2 w-full mt-4">
                    <button onclick="startGame(true)" class="${btnClass}">BAT FIRST</button>
                    <button onclick="startGame(false)" class="${btnClass} bg-gray-300">BOWL FIRST</button>
                </div>
            `);
        }

        function startGame(userBattingFirst) {
            state.isUserBatting = userBattingFirst;
            // Remove temp buttons and restore grid
            document.getElementById('temp-toss-choices').remove();
            initializeGameView();
        }

        function initializeGameView() {
            el.gameView.classList.remove('hidden');
            el.movesGrid.classList.remove('hidden');
            updateScores();
        }

        // --- GAME PLAY LOGIC ---
        function selectMove(value) {
            if (state.isGameOver) return;
            state.userActiveMoveVal = value;
            
            // Highlight chosen move
            const btns = el.movesGrid.querySelectorAll('button');
            btns.forEach(b => b.classList.remove('active-move'));
            document.getElementById(`btn-${value}`).classList.add('active-move');

            el.instruction.innerText = `You selected ${value}. Computer is thinking...`;
            
            // Short delay to simulate AI thought
            setTimeout(() => playTurn(value), 500);
        }

        function playTurn(userMoveVal) {
            // Find user data
            const userMoveObj = MOVES.find(m => m.val === userMoveVal);
            
            // Risk-based CPU choice logic:
            // Calculate chance (weighted by score risk) that CPU also picks this move.
            const baseChanceOfMatching = 0.05; // 5% baseline
            const riskWeight = userMoveObj.risk;
            const matchProbability = baseChanceOfMatching * riskWeight;

            let cpuMoveObj;
            if (Math.random() < matchProbability) {
                // CPU matches the user choice! (Out!)
                cpuMoveObj = userMoveObj;
            } else {
                // CPU makes a random choice (unweighted)
                cpuMoveObj = MOVES[Math.floor(Math.random() * MOVES.length)];
            }

            const cpuMoveVal = cpuMoveObj.val;

            // Update UI with both choices
            updateMoveDisplays(userMoveObj, cpuMoveObj);

            // Calculate scoring/out logic
            if (userMoveVal === cpuMoveVal) {
                handleOut();
            } else {
                let runsToAdd = state.isUserBatting ? userMoveVal : cpuMoveVal;
                processRuns(runsToAdd);
            }
        }

        function updateMoveDisplays(userMoveObj, cpuMoveObj) {
            el.cpuMoveDiv.classList.remove('hidden');
            el.userMoveDiv.classList.remove('hidden');
            el.cpuMoveImg.innerText = cpuMoveObj.img;
            el.userMoveImg.innerText = userMoveObj.img;
        }

        function processRuns(runs) {
            // Update score
            if (state.isUserBatting) state.userScore += runs;
            else state.cpuScore += runs;
            
            updateScores();
            
            // Check for specific visual/audio triggers
            if (runs >= 6) {
                audio.crowd.play(); // Play crowd cheer
            }

            // Animate Ball based on score
            animateBall(runs);

            // Win condition check (target reached)
            if (state.target !== Infinity) {
                if (state.isUserBatting && state.userScore > state.target) endGame();
                else if (!state.isUserBatting && state.cpuScore > state.target) endGame();
            }
        }

        function handleOut() {
            audio.out.play(); // Play error buzz
            el.outModal.classList.remove('hidden');
        }

        function handleNextInnings() {
            el.outModal.classList.add('hidden');
            el.cpuMoveDiv.classList.add('hidden');
            el.userMoveDiv.classList.add('hidden');
            state.userActiveMoveVal = null;
            // Clear highlighting
            el.movesGrid.querySelectorAll('button').forEach(b => b.classList.remove('active-move'));

            // Set Target if 1st innings finished
            if (state.target === Infinity) {
                state.target = state.isUserBatting ? state.userScore : state.cpuScore;
                state.isUserBatting = !state.isUserBatting; // Switch role

                // 2nd innings start logic
                updateScores(); // Display target
                el.tossText.innerHTML = `Switching sides! New Target: <span class="text-orange-400 font-black">${state.target + 1}</span>`;
                el.instruction.innerText = state.isUserBatting ? "Your turn to Chase. Select a Move!" : "Your turn to Bowl. Stop the Chase!";
            } else {
                // Game Over after 2nd innings
                endGame();
            }
        }

        // --- UI VISUAL UTILITIES ---
        function updateScores() {
            let currentScore = state.isUserBatting ? state.userScore : state.cpuScore;
            let currentInningsName = state.isUserBatting ? "USER BATTING" : "CPU BATTING";
            
            el.scoreboard.innerText = currentScore;
            el.instruction.innerText = `${currentInningsName}. Next Move?`;

            if (state.target !== Infinity) {
                el.target.innerText = `Target: ${state.target + 1}`;
                el.target.classList.remove('hidden');
            }
        }

        function animateBall(runs) {
            // Determine animation type
            let animationName;
            if (runs < 6) animationName = 'flatBall 0.5s ease-out';
            else if (runs === 6) animationName = 'highBall 0.7s ease-out';
            else animationName = 'superBall6Plus 0.9s ease-out';

            // Reset and fire ball
            el.ball.style.animation = 'none';
            void el.ball.offsetWidth; // Force reflow
            el.ball.style.animation = animationName;
        }

        // --- END GAME logic ---
        function endGame() {
            state.isGameOver = true;
            el.gameView.classList.add('hidden');
            el.tossStatus.classList.add('hidden');

            let message;
            let finalUser = state.userScore;
            let finalCpu = state.cpuScore;

            if (state.userScore > state.cpuScore) message = "YOU WIN! 🎉";
            else if (state.cpuScore > state.userScore) message = "CPU WINS! 💻";
            else message = "IT'S A TIE! ⚖️";

            // Overwrite Upper Half with End Result view
            document.getElementById('cpu-score-area').innerHTML = `
                <h1 class="text-8xl font-black title-font gradient-title mb-4">${message}</h1>
                <p class="text-2xl gradient-subtitle">Final Score - You: ${finalUser} | CPU: ${finalCpu}</p>
                <button onclick="location.reload()" class="bg-yellow-400 text-black px-12 py-4 rounded-full font-bold mt-10 text-xl transform scale-110">REPLAY MATCH</button>
            `;
        }
    </script>
</body>
</html>
